name: Wyoming Sherpa ASR
version: 1.0.3
slug: wyoming_sherpa_asr
description: Chinese speech-to-text using selectable sherpa-onnx Paraformer models. Fast approx 0.5-1 GB, large approx 1.5-2.5 GB.
url: https://github.com/atsrxL/ha-addons/tree/main/wyoming_sherpa_asr
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
image: atsrxl/wyoming-sherpa-asr
ports:
  10303/tcp: 10303
ports_description:
  10303/tcp: Wyoming protocol
map:
  - type: addon_config
    read_only: false
options:
  model: fast
  num_threads: 4
schema:
  model: list(fast|large)
  num_threads: int(1,16)
