name: Wyoming Sherpa ASR
version: 1.0.4
slug: wyoming_sherpa_asr
description: Fast Chinese speech-to-text using sherpa-onnx Paraformer. Approx memory 0.5-1 GB.
url: https://github.com/atsrxL/ha-addons/tree/main/wyoming_sherpa_asr
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
image: atsrxl/wyoming-sherpa-asr
ports:
  10303/tcp: 10303
ports_description:
  10303/tcp: Wyoming protocol
map:
  - type: addon_config
    read_only: false
options:
  num_threads: 4
schema:
  num_threads: int(1,16)
