name: "Raritan PX MQTT"
version: "0.1.0"
slug: "raritan_px_mqtt"
image: "ghcr.io/atsrxl/raritan-px-mqtt/{arch}"
description: "Bridge a Raritan PX2/PX3 PDU to Home Assistant through the existing MQTT broker"
url: "https://github.com/atsrxL/ha-addons"
startup: application
boot: auto
init: false
arch:
  - aarch64
  - amd64
services:
  - mqtt:need
options:
  pdu_host: "192.168.123.78"
  pdu_username: "admin"
  pdu_password: ""
  protocol: "https"
  verify_ssl: false
  poll_interval: 15
  discovery_prefix: "homeassistant"
  topic_prefix: "raritan2mqtt"
  log_level: "INFO"
schema:
  pdu_host: str
  pdu_username: str
  pdu_password: password
  protocol: list(http|https)
  verify_ssl: bool
  poll_interval: int(5,3600)
  discovery_prefix: str
  topic_prefix: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
