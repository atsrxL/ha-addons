configuration:
  pdu_host:
    name: PDU 地址
    description: Raritan PDU 的 IP 地址或主机名。
  pdu_username:
    name: PDU 用户名
    description: Raritan 网页及 JSON-RPC 登录账号。
  pdu_password:
    name: PDU 密码
    description: Raritan 网页及 JSON-RPC 登录密码。
  protocol:
    name: 连接协议
    description: 访问 Raritan JSON-RPC API 使用的协议。
  verify_ssl:
    name: 验证 TLS 证书
    description: 是否验证 PDU 的 HTTPS 证书。
  poll_interval:
    name: 轮询间隔
    description: 两次状态更新之间的秒数。
  discovery_prefix:
    name: MQTT Discovery 前缀
    description: Home Assistant MQTT Discovery 使用的前缀。
  topic_prefix:
    name: MQTT 主题前缀
    description: 本插件发布数据使用的根主题。
  log_level:
    name: 日志级别
    description: 插件日志的详细程度。
