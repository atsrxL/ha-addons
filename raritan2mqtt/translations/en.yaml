configuration:
  pdu_host:
    name: PDU host
    description: IP address or hostname of the Raritan PDU.
  pdu_username:
    name: PDU username
    description: Raritan web/JSON-RPC account name.
  pdu_password:
    name: PDU password
    description: Password for the Raritan web/JSON-RPC account.
  protocol:
    name: Protocol
    description: Protocol used for the Raritan JSON-RPC API.
  verify_ssl:
    name: Verify TLS certificate
    description: Verify the PDU HTTPS certificate.
  poll_interval:
    name: Poll interval
    description: Number of seconds between updates.
  discovery_prefix:
    name: MQTT Discovery prefix
    description: Home Assistant MQTT Discovery prefix.
  topic_prefix:
    name: MQTT topic prefix
    description: Root topic used by this add-on.
  log_level:
    name: Log level
    description: Add-on logging verbosity.
