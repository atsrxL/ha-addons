name: Build UPS NUT Server

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "ups_nut_server/**"
      - ".github/workflows/build-ups-nut-server.yaml"
  push:
    branches:
      - main
    paths:
      - "ups_nut_server/**"
      - ".github/workflows/build-ups-nut-server.yaml"

concurrency:
  group: ups-nut-server-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare build
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Read app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./ups_nut_server

      - name: Normalize app information
        id: normalize
        shell: bash
        run: |
          image='${{ steps.info.outputs.image }}'
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          echo "version=${{ steps.info.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "name=${{ steps.info.outputs.name }}" >> "$GITHUB_OUTPUT"
          echo "description=${{ steps.info.outputs.description }}" >> "$GITHUB_OUTPUT"
          echo "url=${{ steps.info.outputs.url }}" >> "$GITHUB_OUTPUT"

      - name: Prepare architecture matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./ups_nut_server
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            io.hass.url=${{ needs.prepare.outputs.url }}
          push: ${{ github.event_name != 'pull_request' }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-architecture manifest
    needs:
      - prepare
      - build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}