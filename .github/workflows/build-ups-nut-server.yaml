name: Build UPS NUT Server

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "ups_nut_server/**"
      - ".github/workflows/build-ups-nut-server.yaml"
  push:
    branches:
      - main
    paths:
      - "ups_nut_server/**"
      - ".github/workflows/build-ups-nut-server.yaml"

concurrency:
  group: ups-nut-server-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build multi-architecture image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app
        shell: bash
        run: |
          version="$(awk -F': *' '$1 == "version" {gsub(/"/, "", $2); print $2; exit}' ups_nut_server/config.yaml)"
          test -n "${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./ups_nut_server
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/atsrxl/ups-nut-server:${{ steps.app.outputs.version }}
            ghcr.io/atsrxl/ups-nut-server:latest
          build-args: |
            BUILD_VERSION=${{ steps.app.outputs.version }}
          cache-from: type=gha,scope=ups-nut-server
          cache-to: type=gha,mode=max,scope=ups-nut-server
          provenance: false