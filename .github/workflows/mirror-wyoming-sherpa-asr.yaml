name: Mirror Wyoming Sherpa ASR to GHCR

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "wyoming_sherpa_asr/**"
      - ".github/workflows/mirror-wyoming-sherpa-asr.yaml"
  push:
    branches:
      - main
    paths:
      - "wyoming_sherpa_asr/**"
      - ".github/workflows/mirror-wyoming-sherpa-asr.yaml"

concurrency:
  group: wyoming-sherpa-asr-ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  SOURCE_IMAGE: docker.io/atsrxl/wyoming-sherpa-asr:1.0.5
  TARGET_IMAGE: ghcr.io/atsrxl/wyoming-sherpa-asr

jobs:
  mirror:
    name: Verify and mirror multi-architecture image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read target version
        id: app
        shell: bash
        run: |
          version="$(awk -F': *' '$1 == "version" {gsub(/"/, "", $2); print $2; exit}' wyoming_sherpa_asr/config.yaml)"
          test -n "${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install Skopeo
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends skopeo

      - name: Verify Docker Hub source image
        shell: bash
        run: |
          skopeo inspect --raw "docker://${SOURCE_IMAGE}" > source-manifest.json
          jq -e '
            any(.manifests[]; .platform.os == "linux" and .platform.architecture == "amd64") and
            any(.manifests[]; .platform.os == "linux" and .platform.architecture == "arm64")
          ' source-manifest.json >/dev/null
          jq -r '.manifests[].platform | "\(.os)/\(.architecture)"' source-manifest.json

      - name: Copy versioned image to GHCR
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo copy --all --remove-signatures \
            --dest-creds "${GITHUB_ACTOR}:${GHCR_TOKEN}" \
            "docker://${SOURCE_IMAGE}" \
            "docker://${TARGET_IMAGE}:${{ steps.app.outputs.version }}"

      - name: Copy latest image to GHCR
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo copy --all --remove-signatures \
            --dest-creds "${GITHUB_ACTOR}:${GHCR_TOKEN}" \
            "docker://${SOURCE_IMAGE}" \
            "docker://${TARGET_IMAGE}:latest"

      - name: Verify published GHCR image
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo inspect --raw \
            --creds "${GITHUB_ACTOR}:${GHCR_TOKEN}" \
            "docker://${TARGET_IMAGE}:${{ steps.app.outputs.version }}" \
            > target-manifest.json
          jq -e '
            any(.manifests[]; .platform.os == "linux" and .platform.architecture == "amd64") and
            any(.manifests[]; .platform.os == "linux" and .platform.architecture == "arm64")
          ' target-manifest.json >/dev/null