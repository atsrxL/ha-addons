name: Build DeepSeek Ollama Proxy

on:
  pull_request:
    branches:
      - main
    paths:
      - deepseek_ollama_proxy/**
      - .github/workflows/deepseek-ollama-proxy.yaml
  push:
    branches:
      - main
    paths:
      - deepseek_ollama_proxy/**
      - .github/workflows/deepseek-ollama-proxy.yaml
  workflow_dispatch:

permissions:
  contents: read

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: deepseek-ollama-proxy
  REGISTRY_PREFIX: ghcr.io/atsrxl

jobs:
  prepare:
    name: Prepare build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.normalize.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Read Add-on metadata
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./deepseek_ollama_proxy

      - name: Normalize version
        id: normalize
        run: |
          version=${{ steps.info.outputs.version }}
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare architecture matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./deepseek_ollama_proxy
          cosign: ${{ github.event_name != 'pull_request' }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=DeepSeek Ollama Proxy
          push: ${{ github.event_name != 'pull_request' }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-architecture manifest
    needs:
      - prepare
      - build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ env.REGISTRY_PREFIX }}
